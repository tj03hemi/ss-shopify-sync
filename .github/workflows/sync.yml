name: Collection Cleanup

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Actually remove memberships? Leave 'false' for a dry run first."
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      target_collections:
        description: "Collections to empty (comma-separated titles)"
        type: string
        default: "Men's Apparel,Women's Apparel,Kids' Apparel"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run cleanup
        env:
          SHOPIFY_STORE:         ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          EXECUTE:            ${{ github.event.inputs.execute }}
          TARGET_COLLECTIONS: ${{ github.event.inputs.target_collections }}
        run: |
          FILE="$(find . -name collection_cleanup.py | head -n1)"
          python "$FILE"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-cleanup
          path: collection_cleanup.csv
          if-no-files-found: ignore
