name: S&S Activewear to Shopify Sync

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      initial_build:
        description: 'Initial build (creates products as active)'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          SS_USERNAME:            ${{ secrets.SS_USERNAME }}
          SS_API_KEY:             ${{ secrets.SS_API_KEY }}
          SHOPIFY_STORE:          ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:      ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:  ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          INITIAL_BUILD:          ${{ inputs.initial_build }}
        run: python ss_shopify_sync.py
