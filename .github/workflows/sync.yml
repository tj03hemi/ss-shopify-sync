name: Collection Audit

on:
  workflow_dispatch:
    inputs:
      cutoff:
        description: "Deploy date to split before/after (YYYY-MM-DD), optional"
        type: string
        default: ""

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run audit
        env:
          SHOPIFY_STORE:         ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          CUTOFF:                ${{ github.event.inputs.cutoff }}
        run: |
          FILE="$(find . -name collections_audit.py | head -n1)"
          python "$FILE"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-audit
          path: collection_audit.csv
          if-no-files-found: ignore
